server {
    listen __PORT__;
    root /var/www/html/public;
    index index.php;
    charset utf-8;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Vite-built assets under /build/ are content-hashed — safe to cache forever.
    # Scoped to /build/ only so Livewire/Filament PHP-served assets are NOT
    # intercepted here (they would return 404 since no physical file exists).
    location ^~ /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block hidden files except Let's Encrypt challenges
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
