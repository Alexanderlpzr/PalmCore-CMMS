server {
    listen __PORT__;
    root /var/www/html/public;
    index index.php;
    charset utf-8;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Vite-built assets under /build/ are content-hashed — safe to cache forever.
    location ^~ /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Livewire JS: try the published static file first, fall back to PHP route.
    # The PHP route is registered at /livewire/livewire.min.js via setScriptRoute().
    location = /livewire/livewire.min.js {
        expires 1h;
        add_header Cache-Control "public";
        try_files /vendor/livewire/livewire.min.js /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
