version: "3.9"

services:
  app:
    container_name: palmcore-app

    build:
      context: ..
      dockerfile: Dockerfile

    image: palmcore:latest

    restart: unless-stopped

    ports:
      - "80:80"

    env_file:
      - ../.env

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - palmcore_storage:/var/www/html/storage

    networks:
      - palmcore

  postgres:
    image: postgres:17-alpine

    container_name: palmcore-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: palmcore
      POSTGRES_USER: palmcore
      POSTGRES_PASSWORD: compila123

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palmcore -d palmcore"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - palmcore

  redis:
    image: redis:7-alpine

    container_name: palmcore-redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - palmcore

networks:
  palmcore:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  palmcore_storage: