services:
  app:
    container_name: palmcore-app

    build:
      context: ..
      dockerfile: Dockerfile

    image: palmcore:latest

    restart: unless-stopped

    expose:
      - "80"

    env_file:
      - ../.env.production

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - palmcore_storage:/var/www/html/storage

    networks:
      - palmcore

  postgres:
    image: postgres:17-alpine

    container_name: palmcore-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - palmcore

  redis:
    image: redis:7-alpine

    container_name: palmcore-redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - palmcore

  caddy:
    image: caddy:2

    container_name: palmcore-caddy

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - app

    networks:
      - palmcore

networks:
  palmcore:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  palmcore_storage:
  caddy_data:
  caddy_config: